server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Always serve fresh config (generated at container start).
    location = /config.json {
        add_header Cache-Control "no-store";
    }

    # SPA-style: hash routing only, but make sure unknown paths fall back to index.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
